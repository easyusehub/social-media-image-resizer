<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Media Image Resizer – EasyUseHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --accent: #22d3ee; --bg: #ffffff; --text: #0f172a; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { 
            background: #fff; padding: 10px 15px; border-bottom: 1px solid #eee; 
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
        }
        .header-left { display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: 700; }
        .btn-dl { background: #000; color: #fff; padding: 8px 18px; border-radius: 30px; font-weight: 800; font-size: 13px; display: none; cursor: pointer; border: none; }

        .container { width: 92%; max-width: 600px; margin: 10px auto; overflow-y: auto; flex: 1; }

        /* --- Landing Page --- */
        #landing-page { display: block; padding-bottom: 80px; }
        .upload-card { 
            background: #f8fafc; border: 2.5px dashed #cbd5e1; padding: 50px 20px; 
            border-radius: 25px; text-align: center; cursor: pointer; transition: 0.3s; margin: 15px 0;
        }
        .ad-card { background: linear-gradient(135deg, #1e3a8a, #2563eb); color: white; padding: 18px; margin-bottom: 12px; border-radius: 18px; cursor: pointer; position: relative; }
        .ad-btn { background: #fbbf24; color: #000; padding: 6px 12px; border-radius: 10px; font-weight: 800; font-size: 10px; display: inline-block; margin-top: 8px; }

        /* --- Editor Page --- */
        #editor-page { display: none; flex: 1; flex-direction: column; background: #fafafa; position: relative; }
        .workspace { flex: 1; display: flex; align-items: center; justify-content: center; padding: 15px; overflow: hidden; }
        .img-wrap { 
            position: relative; box-shadow: 0 5px 25px rgba(0,0,0,0.08); 
            background: #fff; overflow: hidden; display: flex; align-items: center; justify-content: center;
            max-width: 95%; max-height: 95%;
        }
        #imagePreview { max-width: 100%; max-height: 100%; display: block; object-fit: contain; }

        .editor-controls { background: #fff; border-top: 1px solid #eee; padding: 10px 0 20px 0; }
        .aspect-list { display: flex; gap: 15px; padding: 10px 15px; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .aspect-list::-webkit-scrollbar { display: none; }
        .aspect-item { flex: 0 0 auto; text-align: center; cursor: pointer; min-width: 65px; }
        .aspect-shape { border: 2px solid #e2e8f0; border-radius: 8px; margin-bottom: 5px; transition: 0.2s; display: flex; align-items: center; justify-content: center; margin-left: auto; margin-right: auto; background: #fff; }
        .aspect-item.active .aspect-shape { border-color: var(--primary); background: rgba(37, 99, 235, 0.05); transform: scale(1.05); }
        .aspect-item span { font-size: 10px; font-weight: 700; color: #64748b; }

        /* --- Bottom Nav (Landing only) --- */
        #bottom-nav-landing { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; padding: 15px; border-top: 1px solid #eee; display: flex; justify-content: center; gap: 10px; z-index: 1001; }
        .nav-btn { text-decoration: none; padding: 10px 20px; border-radius: 30px; font-weight: 800; font-size: 12px; color: #fff; background: var(--primary); }
        .pdf-btn { background: #10b981; }

        canvas, #fileInput { display: none; }
    </style>
</head>
<body>

<header>
    <div class="header-left" id="headerBrand" onclick="location.reload()">EasyUseHub</div>
    <div class="header-left" id="backBtn" style="display: none;" onclick="location.reload()">
        <span style="font-size: 22px;">←</span>
    </div>
    <button id="downloadBtn" class="btn-dl" onclick="processDownload()">Download ↓</button>
</header>

<div id="landing-page">
    <div class="container">
        <div style="text-align:center; margin: 15px 0;">
            <h2 style="font-weight: 800; font-size: 20px;">Image Resizer</h2>
            <p style="font-size: 13px; color: #64748b;">Fast & High-Quality Resizing</p>
        </div>

        <div class="upload-card" onclick="document.getElementById('fileInput').click()">
            <img src="https://cdn-icons-png.flaticon.com/512/3344/3344310.png" width="40" style="margin-bottom: 10px; opacity: 0.7;">
            <h3 style="font-size: 16px;">Choose Photo</h3>
        </div>

        <div class="ad-card" onclick="window.open('https://easyusehub.blogspot.com', '_blank')">
            <b style="font-size: 14px;">💎 46+ Pro Tools Bundle</b>
            <div class="ad-btn">Explore Hub</div>
        </div>
        <div class="ad-card" style="background: linear-gradient(135deg, #059669, #10b981);" onclick="window.open('https://easyusehub.blogspot.com/p/image-compressor.html', '_blank')">
            <b style="font-size: 14px;">⚡ Image Compressor</b>
        </div>
    </div>
    
    <div id="bottom-nav-landing">
        <a href="https://easyusehub.blogspot.com" class="nav-btn">🏠 Home</a>
        <a href="https://easyusehub.blogspot.com/p/free-pdf-tools-online.html" class="nav-btn pdf-btn">📄 All PDF Tools</a>
    </div>
</div>

<div id="editor-page">
    <div class="workspace">
        <div class="img-wrap" id="imgWrap">
            <img id="imagePreview" src="" alt="Preview">
        </div>
    </div>
    <div class="editor-controls">
        <div class="aspect-list">
            <div class="aspect-item active" onclick="setAspect('auto', 'auto', this, 'Original')">
                <div class="aspect-shape" style="width: 40px; height: 40px; border-style: dashed;"></div>
                <span>Original</span>
            </div>
            <div class="aspect-item" onclick="setAspect(9, 16, this, 'Story')">
                <div class="aspect-shape" style="width: 28px; height: 50px;"></div>
                <span>Story</span>
            </div>
            <div class="aspect-item" onclick="setAspect(1, 1, this, 'Square')">
                <div class="aspect-shape" style="width: 40px; height: 40px;"></div>
                <span>Square</span>
            </div>
            <div class="aspect-item" onclick="setAspect(9, 16, this, 'Reels')">
                <div class="aspect-shape" style="width: 28px; height: 50px; background: #f0f0f0;"></div>
                <span>Reels</span>
            </div>
            <div class="aspect-item" onclick="setAspect(4, 5, this, 'Portrait')">
                <div class="aspect-shape" style="width: 36px; height: 45px;"></div>
                <span>Portrait</span>
            </div>
            <div class="aspect-item" onclick="setAspect(16, 9, this, 'YouTube')">
                <div class="aspect-shape" style="width: 50px; height: 28px;"></div>
                <span>YouTube</span>
            </div>
        </div>
    </div>
</div>

<input type="file" id="fileInput" accept="image/*">
<canvas id="canvas"></canvas>

<script>
    const fileInput = document.getElementById('fileInput');
    const landing = document.getElementById('landing-page');
    const editor = document.getElementById('editor-page');
    const preview = document.getElementById('imagePreview');
    const imgWrap = document.getElementById('imgWrap');
    const dlBtn = document.getElementById('downloadBtn');
    const backBtn = document.getElementById('backBtn');
    const brand = document.getElementById('headerBrand');
    let originalImg = new Image();
    let currentMode = 'Original';

    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                originalImg.src = event.target.result;
                originalImg.onload = () => {
                    preview.src = originalImg.src;
                    landing.style.display = "none";
                    editor.style.display = "flex";
                    dlBtn.style.display = "block";
                    backBtn.style.display = "flex";
                    brand.style.display = "none";
                };
            };
            reader.readAsDataURL(file);
        }
    };

    function setAspect(w, h, el, mode) {
        document.querySelectorAll('.aspect-item').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        currentMode = mode;

        if(w === 'auto') {
            imgWrap.style.aspectRatio = "auto";
            imgWrap.style.width = "auto";
            imgWrap.style.height = "auto";
        } else {
            imgWrap.style.aspectRatio = `${w} / ${h}`;
            imgWrap.style.width = "100%";
        }
    }

    function processDownload() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let tw = originalImg.width, th = originalImg.height;

        if(currentMode === "Story" || currentMode === "Reels") { tw = 1080; th = 1920; }
        else if(currentMode === "Square") { tw = 1080; th = 1080; }
        else if(currentMode === "YouTube") { tw = 1920; th = 1080; }
        else if(currentMode === "Portrait") { tw = 1080; th = 1350; }

        canvas.width = tw; canvas.height = th;
        ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, tw, th);

        const imgRatio = originalImg.width / originalImg.height;
        const targetRatio = tw / th;
        let dw, dh, x, y;

        if (imgRatio > targetRatio) { dw = tw; dh = tw / imgRatio; x = 0; y = (th - dh) / 2; }
        else { dh = th; dw = th * imgRatio; x = (tw - dw) / 2; y = 0; }

        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(originalImg, x, y, dw, dh);
        
        const link = document.createElement('a');
        link.download = `EasyUseHub_${currentMode}.png`;
        link.href = canvas.toDataURL("image/png", 1.0);
        link.click();
    }
</script>
</body>
</html>
