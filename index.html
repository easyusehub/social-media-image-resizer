<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media Resizer – EasyUseHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ffffff; --bg: #f8fafc; --text: #0f172a; --accent: #3b82f6; --card: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* Top Header */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 20px; background: white; border-bottom: 1px solid #e2e8f0;
            position: sticky; top: 0; z-index: 100;
        }
        .btn-icon { background: #f1f5f9; border: none; padding: 10px; border-radius: 12px; cursor: pointer; font-weight: 700; }
        .btn-download { background: #000; color: #fff; padding: 10px 20px; border-radius: 25px; font-weight: 700; text-decoration: none; font-size: 14px; }

        /* Image Preview Area */
        .preview-container { 
            width: 100%; height: 50vh; display: flex; align-items: center; justify-content: center; 
            padding: 20px; background: #fff; position: relative;
        }
        #imagePreview { 
            max-width: 100%; max-height: 100%; border: 2px solid var(--accent); 
            border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        /* Bottom Control Panel */
        .controls-panel { 
            position: fixed; bottom: 0; left: 0; width: 100%; background: white; 
            border-top-left-radius: 30px; border-top-right-radius: 30px; 
            box-shadow: 0 -10px 30px rgba(0,0,0,0.05); padding: 20px 0;
        }

        /* Platform Tabs */
        .tabs { display: flex; overflow-x: auto; padding: 0 20px; gap: 10px; margin-bottom: 20px; scrollbar-width: none; }
        .tab-btn { 
            background: #f1f5f9; border: 1px solid #e2e8f0; padding: 8px 18px; 
            border-radius: 20px; font-size: 13px; font-weight: 700; white-space: nowrap; cursor: pointer;
        }
        .tab-btn.active { background: #000; color: #fff; border-color: #000; }

        /* Aspect Ratio Grid */
        .aspect-grid { 
            display: flex; overflow-x: auto; padding: 0 20px 10px; gap: 20px; scrollbar-width: none;
        }
        .aspect-item { flex: 0 0 80px; text-align: center; cursor: pointer; }
        .aspect-icon { 
            width: 60px; height: 75px; border: 2px solid #e2e8f0; border-radius: 10px; 
            margin: 0 auto 8px; display: flex; align-items: center; justify-content: center;
        }
        .aspect-item.active .aspect-icon { border-color: var(--accent); background: rgba(59, 130, 246, 0.05); }
        .aspect-item span { font-size: 12px; font-weight: 600; color: #64748b; }

        /* Hidden Canvas */
        canvas { display: none; }
        #fileInput { display: none; }
    </style>
</head>
<body>

<header>
    <button class="btn-icon" onclick="location.reload()">← Home</button>
    <a href="#" id="downloadBtn" class="btn-download" onclick="downloadImage()">Download ↓</a>
</header>

<div class="preview-container" onclick="document.getElementById('fileInput').click()">
    <img id="imagePreview" src="https://via.placeholder.com/400x300?text=Tap+to+Upload+Image" alt="Preview">
    <input type="file" id="fileInput" accept="image/*">
</div>

<div class="controls-panel">
    <div class="tabs">
        <button class="tab-btn active">All</button>
        <button class="tab-btn">Instagram</button>
        <button class="tab-btn">Facebook</button>
        <button class="tab-btn">YouTube</button>
    </div>

    <div class="aspect-grid" id="aspectGrid">
        <div class="aspect-item active" onclick="setRatio(1, 1, this)">
            <div class="aspect-icon" style="width: 50px; height: 50px;"></div>
            <span>Original</span>
        </div>
        <div class="aspect-item" onclick="setRatio(9, 16, this)">
            <div class="aspect-icon" style="width: 35px; height: 60px;"></div>
            <span>Story</span>
        </div>
        <div class="aspect-item" onclick="setRatio(1, 1, this)">
            <div class="aspect-icon" style="width: 50px; height: 50px;"></div>
            <span>Square</span>
        </div>
        <div class="aspect-item" onclick="setRatio(9, 16, this)">
            <div class="aspect-icon" style="width: 35px; height: 60px;"></div>
            <span>Reels</span>
        </div>
        <div class="aspect-item" onclick="setRatio(4, 5, this)">
            <div class="aspect-icon" style="width: 45px; height: 55px;"></div>
            <span>Portrait</span>
        </div>
    </div>
</div>

<canvas id="canvas"></canvas>

<script>
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('imagePreview');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let originalImg = new Image();

    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const url = URL.createObjectURL(file);
            preview.src = url;
            originalImg.src = url;
        }
    };

    function setRatio(w, h, element) {
        // UI Change
        document.querySelectorAll('.aspect-item').forEach(i => i.classList.remove('active'));
        element.classList.add('active');

        // Logic (Simulating Preview Change)
        preview.style.aspectRatio = `${w} / ${h}`;
        preview.style.objectFit = "cover";
    }

    function downloadImage() {
        if (!originalImg.src) return alert("Upload image first!");
        
        const activeItem = document.querySelector('.aspect-item.active span').innerText;
        // Simple logic for download based on selected ratio
        canvas.width = 1080; 
        canvas.height = 1080; // Default Square

        if(activeItem === "Story") { canvas.width = 1080; canvas.height = 1920; }
        
        ctx.drawImage(originalImg, 0, 0, canvas.width, canvas.height);
        const link = document.createElement('a');
        link.download = 'EasyUseHub_Resized.png';
        link.href = canvas.toDataURL();
        link.click();
    }
</script>

</body>
</html>
