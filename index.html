<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EasyUseHub – Pro Image Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #000; --text-dim: #999; --border: #eeeeee; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #fff; color: #000; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header */
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid var(--border); }
        #brand { font-weight: 800; font-size: 19px; letter-spacing: -0.8px; }
        .header-btns { display: flex; gap: 12px; }
        .btn-ui { border: none; padding: 7px 15px; border-radius: 6px; font-weight: 700; font-size: 11px; cursor: pointer; }
        .new-btn { background: #f5f5f5; color: #000; display: none; }
        .export-btn { background: #000; color: #fff; display: none; }

        /* Workspace */
        #landing-page { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .upload-trigger { width: 100%; max-width: 340px; height: 200px; border: 1.5px dashed #ddd; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .upload-trigger:hover { border-color: #000; background: #fafafa; }

        #editor-page { display: none; flex: 1; flex-direction: column; overflow: hidden; background: #fafafa; }
        .workspace { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px; overflow: hidden; }
        .img-wrap { display: flex; align-items: center; justify-content: center; max-width: 100%; max-height: 100%; background: #fff; box-shadow: 0 10px 40px rgba(0,0,0,0.05); transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1); }
        #imagePreview { max-width: 100%; max-height: 100%; display: block; object-fit: contain; }

        /* Controls */
        .controls { background: #fff; border-top: 0.5px solid var(--border); }
        .cat-row { display: flex; gap: 20px; padding: 18px 20px; overflow-x: auto; scrollbar-width: none; border-bottom: 0.5px solid var(--border); }
        .cat-row::-webkit-scrollbar { display: none; }
        .cat-item { font-size: 10px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; cursor: pointer; white-space: nowrap; letter-spacing: 0.5px; }
        .cat-item.active { color: #000; }

        .aspect-row { display: flex; gap: 15px; padding: 15px 20px 35px 20px; overflow-x: auto; scrollbar-width: none; align-items: flex-end; }
        .aspect-row::-webkit-scrollbar { display: none; }
        .aspect-item { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; cursor: pointer; min-width: 85px; }
        .shape-view { width: 52px; height: 52px; border: 1.5px solid #eee; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; transition: 0.2s; }
        .aspect-item.active .shape-view { border-color: #000; background: #f9f9f9; }
        .inner-box { border: 1.5px solid #000; }
        .aspect-item span { font-size: 9px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; text-align: center; width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .aspect-item.active span { color: #000; }

        canvas, #fileInput { display: none; }
    </style>
</head>
<body>

<header>
    <div id="brand">EasyUseHub</div>
    <div class="header-btns">
        <button id="newBtn" class="btn-ui new-btn" onclick="document.getElementById('fileInput').click()">NEW</button>
        <button id="exportBtn" class="btn-ui export-btn" onclick="processDownload()">EXPORT</button>
    </div>
</header>

<div id="landing-page">
    <div class="upload-trigger" onclick="document.getElementById('fileInput').click()">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="1.8"><path d="M12 5v14M5 12h14"/></svg>
        <span style="margin-top:10px; font-weight:700; font-size:13px;">Open Photo</span>
    </div>
</div>

<div id="editor-page">
    <div class="workspace">
        <div class="img-wrap" id="imgWrap"><img id="imagePreview" src=""></div>
    </div>
    <div class="controls">
        <div class="cat-row">
            <div class="cat-item active" onclick="filterCat('All', this)">All</div>
            <div class="cat-item" onclick="filterCat('Insta', this)">Instagram</div>
            <div class="cat-item" onclick="filterCat('FB', this)">Facebook</div>
            <div class="cat-item" onclick="filterCat('YT', this)">YouTube</div>
            <div class="cat-item" onclick="filterCat('Game', this)">Gaming/Twitch</div>
            <div class="cat-item" onclick="filterCat('Market', this)">E-Commerce</div>
            <div class="cat-item" onclick="filterCat('Social', this)">X/TikTok/Snap</div>
            <div class="cat-item" onclick="filterCat('Other', this)">More</div>
        </div>
        <div class="aspect-row" id="aspectBar"></div>
    </div>
</div>

<input type="file" id="fileInput" accept="image/*">
<canvas id="canvas"></canvas>

<script>
    const aspects = [
        { name: 'Original', w: 'auto', h: 'auto', cat: 'All' },
        // Instagram
        { name: 'Profile Picture', w: 1, h: 1, cat: 'Insta' },
        { name: 'Square Post', w: 1, h: 1, cat: 'Insta' },
        { name: 'Portrait Post', w: 4, h: 5, cat: 'Insta' },
        { name: 'Landscape Post', w: 1.91, h: 1, cat: 'Insta' },
        { name: 'Story', w: 9, h: 16, cat: 'Insta' },
        { name: 'Reels', w: 9, h: 16, cat: 'Insta' },
        { name: 'Reels Cover', w: 9, h: 16, cat: 'Insta' },
        // Facebook
        { name: 'FB Profile', w: 1, h: 1, cat: 'FB' },
        { name: 'Cover Photo', w: 820, h: 312, cat: 'FB' },
        { name: 'Post Image', w: 1, h: 1, cat: 'FB' },
        { name: 'FB Portrait', w: 4, h: 5, cat: 'FB' },
        { name: 'FB Story', w: 9, h: 16, cat: 'FB' },
        { name: 'Event Cover', w: 1200, h: 628, cat: 'FB' },
        { name: 'Banner', w: 16, h: 9, cat: 'FB' },
        // YouTube
        { name: 'Thumbnail', w: 16, h: 9, cat: 'YT' },
        { name: 'Channel Cover', w: 2560, h: 1440, cat: 'YT' },
        { name: 'Video', w: 16, h: 9, cat: 'YT' },
        { name: 'Shorts', w: 9, h: 16, cat: 'YT' },
        { name: 'YT Banner', w: 16, h: 2.5, cat: 'YT' },
        { name: 'YT Profile', w: 1, h: 1, cat: 'YT' },
        // Gaming (Twitch & Roblox)
        { name: 'Twitch Profile', w: 1, h: 1, cat: 'Game' },
        { name: 'Twitch Banner', w: 16, h: 4.8, cat: 'Game' },
        { name: 'Twitch Video', w: 16, h: 9, cat: 'Game' },
        { name: 'Roblox Thumb', w: 16, h: 9, cat: 'Game' },
        { name: 'Roblox Icon', w: 1, h: 1, cat: 'Game' },
        { name: 'Roblox Avatar', w: 1, h: 1, cat: 'Game' },
        // Market (Shopify, eBay, Yelp, Zillow)
        { name: 'Shopify Prod', w: 1, h: 1, cat: 'Market' },
        { name: 'Shopify Banner', w: 16, h: 9, cat: 'Market' },
        { name: 'eBay Product', w: 1, h: 1, cat: 'Market' },
        { name: 'Yelp Business', w: 4, h: 3, cat: 'Market' },
        { name: 'Zillow Image', w: 4, h: 3, cat: 'Market' },
        // Social (TikTok, X, Snap, LI)
        { name: 'TikTok Video', w: 9, h: 16, cat: 'Social' },
        { name: 'Snapchat Snap', w: 9, h: 16, cat: 'Social' },
        { name: 'X Profile', w: 1, h: 1, cat: 'Social' },
        { name: 'X Post', w: 16, h: 9, cat: 'Social' },
        { name: 'LI Profile', w: 1, h: 1, cat: 'Social' },
        { name: 'LI Cover', w: 1584, h: 396, cat: 'Social' },
        // Other (Pinterest, Paper, Discord, Tumblr, Soundcloud, Unsplash, Imgur)
        { name: 'Pin Image', w: 2, h: 3, cat: 'Other' },
        { name: 'Discord Icon', w: 1, h: 1, cat: 'Other' },
        { name: 'SoundCloud Art', w: 1, h: 1, cat: 'Other' },
        { name: 'A4 Paper', w: 1, h: 1.41, cat: 'Other' },
        { name: 'Tumblr Post', w: 4, h: 5, cat: 'Other' },
        { name: 'Unsplash Cover', w: 3, h: 2, cat: 'Other' },
        { name: 'Imgur Post', w: 1, h: 1, cat: 'Other' }
    ];

    let originalImg = new Image(), currentMode = 'Original';

    function renderAspects(filter = 'All') {
        const bar = document.getElementById('aspectBar');
        bar.innerHTML = '';
        const filtered = filter === 'All' ? aspects : aspects.filter(a => a.cat === filter || a.name === 'Original');
        filtered.forEach(asp => {
            const item = document.createElement('div');
            item.className = `aspect-item ${asp.name === currentMode ? 'active' : ''}`;
            let bw = 20, bh = 20;
            if(asp.w !== 'auto') {
                if(asp.w > asp.h) { bw = 35; bh = 35 * (asp.h/asp.w); }
                else { bh = 35; bw = 35 * (asp.w/asp.h); }
            }
            item.onclick = () => setSize(asp.w, asp.h, item, asp.name);
            item.innerHTML = `<div class="shape-view"><div class="inner-box" style="width:${bw}px;height:${bh}px;${asp.w==='auto'?'border-style:dashed':''}"></div></div><span>${asp.name}</span>`;
            bar.appendChild(item);
        });
    }

    document.getElementById('fileInput').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            originalImg.src = ev.target.result;
            originalImg.onload = () => {
                document.getElementById('imagePreview').src = originalImg.src;
                document.getElementById('landing-page').style.display = 'none';
                document.getElementById('editor-page').style.display = 'flex';
                document.getElementById('newBtn').style.display = 'block';
                document.getElementById('exportBtn').style.display = 'block';
                setSize('auto', 'auto', null, 'Original');
                renderAspects('All');
            };
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function filterCat(cat, el) {
        document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        renderAspects(cat);
    }

    function setSize(w, h, el, mode) {
        if(el) { document.querySelectorAll('.aspect-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); }
        currentMode = mode;
        const wrap = document.getElementById('imgWrap');
        if(w === 'auto') { wrap.style.aspectRatio = "auto"; wrap.style.width = "auto"; } 
        else { wrap.style.aspectRatio = `${w}/${h}`; wrap.style.width = "100%"; }
    }

    function processDownload() {
        const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
        const asp = aspects.find(a => a.name === currentMode);
        let tw = originalImg.width, th = originalImg.height;
        if(asp.w !== 'auto') { tw = 2500; th = 2500 * (asp.h/asp.w); }
        canvas.width = tw; canvas.height = th;
        ctx.fillStyle = "#fff"; ctx.fillRect(0,0,tw,th);
        const ir = originalImg.width/originalImg.height, tr = tw/th;
        let dw, dh, x, y;
        if(ir > tr) { dw = tw; dh = tw/ir; x = 0; y = (th-dh)/2; }
        else { dh = th; dw = th*ir; x = (tw-dw)/2; y = 0; }
        ctx.drawImage(originalImg, x, y, dw, dh);
        const link = document.createElement('a');
        link.download = `Resizer_${currentMode}.jpg`;
        link.href = canvas.toDataURL('image/jpeg', 0.95);
        link.click();
    }
</script>
</body>
</html>
