<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EasyUseHub – Ultimate Aspect Resizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --bg: #ffffff; --text: #0f172a; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { background: #fff; padding: 12px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .back-arrow { font-size: 24px; cursor: pointer; font-weight: bold; }
        .download-btn { background: #000; color: #fff; padding: 8px 22px; border-radius: 30px; font-weight: 800; font-size: 13px; border: none; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        #editor-page { flex: 1; display: flex; flex-direction: column; background: #f8fafc; overflow: hidden; }
        .workspace { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; overflow: hidden; }
        .img-wrap { background: #fff; box-shadow: 0 15px 50px rgba(0,0,0,0.08); display: flex; align-items: center; justify-content: center; transition: 0.3s; max-width: 100%; max-height: 100%; position: relative; overflow: hidden; border-radius: 4px; }
        #imagePreview { max-width: 100%; max-height: 100%; display: block; object-fit: contain; }

        /* Category Selector */
        .category-scroll { background: #fff; padding: 12px 20px; border-top: 1px solid #f1f5f9; display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; }
        .category-scroll::-webkit-scrollbar { display: none; }
        .cat-btn { padding: 8px 16px; border-radius: 20px; border: 1.5px solid #e2e8f0; background: #fff; font-size: 11px; font-weight: 700; cursor: pointer; white-space: nowrap; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
        .cat-btn.active { background: #000; color: #fff; border-color: #000; }

        /* Aspect Controls */
        .editor-bottom { background: #fff; border-top: 1px solid #f1f5f9; padding: 15px 0 35px 0; }
        .aspect-list { display: flex; gap: 15px; padding: 0 20px; overflow-x: auto; scrollbar-width: none; }
        .aspect-list::-webkit-scrollbar { display: none; }
        
        .aspect-item { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; cursor: pointer; min-width: 85px; }
        .aspect-shape { width: 70px; height: 70px; border: 2.5px solid #e2e8f0; border-radius: 12px; margin-bottom: 8px; background: #fff; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .aspect-item.active .aspect-shape { border-color: var(--primary); background: rgba(37,99,235,0.05); }
        
        .aspect-item span { font-size: 10px; font-weight: 700; color: #94a3b8; white-space: nowrap; text-align: center; width: 100%; overflow: hidden; text-overflow: ellipsis; }
        .aspect-item.active span { color: var(--primary); }

        .inner-box { border: 2px solid #1e293b; border-radius: 2px; }
        canvas, #fileInput { display: none; }
    </style>
</head>
<body>

<header>
    <div class="back-arrow" onclick="location.reload()">←</div>
    <div style="font-weight: 800; font-size: 16px;">EasyUseHub Resizer</div>
    <button class="download-btn" onclick="processDownload()">Download</button>
</header>

<div id="editor-page">
    <div class="workspace">
        <div class="img-wrap" id="imgWrap">
            <img id="imagePreview" src="" alt="Preview">
        </div>
    </div>

    <div class="category-scroll">
        <button class="cat-btn active" onclick="filterAspects('All', this)">All</button>
        <button class="cat-btn" onclick="filterAspects('YouTube', this)">YouTube</button>
        <button class="cat-btn" onclick="filterAspects('Facebook', this)">Facebook</button>
        <button class="cat-btn" onclick="filterAspects('Instagram', this)">Instagram</button>
        <button class="cat-btn" onclick="filterAspects('TikTok', this)">TikTok</button>
        <button class="cat-btn" onclick="filterAspects('X', this)">X (Twitter)</button>
        <button class="cat-btn" onclick="filterAspects('Paper', this)">Paper/Print</button>
        <button class="cat-btn" onclick="filterAspects('Devices', this)">Devices</button>
        <button class="cat-btn" onclick="filterAspects('Ads', this)">Ads</button>
    </div>

    <div class="editor-bottom">
        <div class="aspect-list" id="aspectContainer"></div>
    </div>
</div>

<input type="file" id="fileInput" accept="image/*">
<canvas id="canvas"></canvas>

<script>
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('imagePreview');
    const imgWrap = document.getElementById('imgWrap');
    let originalImg = new Image();
    let currentMode = 'Original';

    const aspects = [
        { name: 'Original', w: 'auto', h: 'auto', cat: 'All' },
        // YouTube
        { name: 'YT Thumbnail', w: 16, h: 9, cat: 'YouTube' },
        { name: 'YT Banner', w: 16, h: 2.5, cat: 'YouTube' },
        { name: 'YT Profile', w: 1, h: 1, cat: 'YouTube' },
        { name: 'YT Shorts', w: 9, h: 16, cat: 'YouTube' },
        { name: 'YT Display Ad', w: 300, h: 60, cat: 'YouTube' },
        // Facebook
        { name: 'FB Thumbnail', w: 1.91, h: 1, cat: 'Facebook' },
        { name: 'FB Post', w: 1, h: 1, cat: 'Facebook' },
        { name: 'FB Cover', w: 16, h: 6.3, cat: 'Facebook' },
        { name: 'FB Story', w: 9, h: 16, cat: 'Facebook' },
        { name: 'FB Group', w: 1.64, h: 1, cat: 'Facebook' },
        { name: 'FB Event', w: 1.91, h: 1, cat: 'Facebook' },
        // Instagram
        { name: 'Insta Square', w: 1, h: 1, cat: 'Instagram' },
        { name: 'Insta Portrait', w: 4, h: 5, cat: 'Instagram' },
        { name: 'Insta Story', w: 9, h: 16, cat: 'Instagram' },
        { name: 'Insta Reel', w: 9, h: 16, cat: 'Instagram' },
        { name: 'Insta Land', w: 1.91, h: 1, cat: 'Instagram' },
        // TikTok
        { name: 'TikTok Video', w: 9, h: 16, cat: 'TikTok' },
        { name: 'TikTok Ad', w: 9, h: 16, cat: 'TikTok' },
        // Pinterest
        { name: 'Pin 2:3', w: 2, h: 3, cat: 'Instagram' },
        { name: 'Pin Tall', w: 1, h: 2.1, cat: 'Instagram' },
        { name: 'Pin Square', w: 1, h: 1, cat: 'Instagram' },
        // Twitter (X)
        { name: 'X Post', w: 16, h: 9, cat: 'X' },
        { name: 'X Header', w: 3, h: 1, cat: 'X' },
        { name: 'X Card', w: 1.91, h: 1, cat: 'X' },
        // LinkedIn
        { name: 'LI Post', w: 1.2, h: 1, cat: 'Facebook' },
        { name: 'LI Cover', w: 4, h: 1, cat: 'Facebook' },
        // Paper
        { name: 'A4 Paper', w: 1, h: 1.41, cat: 'Paper' },
        { name: 'A3 Paper', w: 1, h: 1.41, cat: 'Paper' },
        { name: 'US Letter', w: 8.5, h: 11, cat: 'Paper' },
        { name: 'Passport Size', w: 1.3, h: 1.7, cat: 'Paper' },
        { name: 'Wallet Size', w: 2, h: 3, cat: 'Paper' },
        // Devices
        { name: 'iPhone Screen', w: 9, h: 19.5, cat: 'Devices' },
        { name: 'Android Full', w: 9, h: 20, cat: 'Devices' },
        { name: 'Apple Watch', w: 4, h: 5, cat: 'Devices' },
        { name: 'iPad Pro', w: 3, h: 4, cat: 'Devices' },
        // Ads
        { name: 'Google Ad M', w: 300, h: 250, cat: 'Ads' },
        { name: 'Leaderboard', w: 728, h: 90, cat: 'Ads' },
        { name: 'Billboard', w: 970, h: 250, cat: 'Ads' }
    ];

    function renderAspects(filter = 'All') {
        const container = document.getElementById('aspectContainer');
        container.innerHTML = '';
        const filtered = filter === 'All' ? aspects : aspects.filter(a => a.cat === filter || a.name === 'Original');
        
        filtered.forEach((asp) => {
            const item = document.createElement('div');
            item.className = `aspect-item ${asp.name === currentMode ? 'active' : ''}`;
            let boxW = 30, boxH = 30;
            if(asp.w !== 'auto') {
                if(asp.w > asp.h) { boxW = 45; boxH = 45 * (asp.h/asp.w); }
                else { boxH = 45; boxW = 45 * (asp.w/asp.h); }
            }
            item.onclick = function() { setAspect(asp.w, asp.h, this, asp.name); };
            item.innerHTML = `
                <div class="aspect-shape">
                    <div class="inner-box" style="width:${boxW}px; height:${boxH}px; ${asp.w==='auto'?'border-style:dashed;':''}"></div>
                </div>
                <span>${asp.name}</span>
            `;
            container.appendChild(item);
        });
    }

    function filterAspects(cat, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderAspects(cat);
    }

    window.onload = () => { fileInput.click(); };

    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            originalImg.src = event.target.result;
            originalImg.onload = () => {
                preview.src = originalImg.src;
                renderAspects('All');
            };
        };
        reader.readAsDataURL(file);
    };

    function setAspect(w, h, el, mode) {
        document.querySelectorAll('.aspect-item').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        currentMode = mode;
        imgWrap.style.aspectRatio = w === 'auto' ? 'auto' : `${w} / ${h}`;
        imgWrap.style.width = w === 'auto' ? 'auto' : "100%";
    }

    function processDownload() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const activeAsp = aspects.find(a => a.name === currentMode);
        let tw = originalImg.width, th = originalImg.height;
        if(activeAsp.w !== 'auto') { tw = 2500; th = 2500 * (activeAsp.h / activeAsp.w); }
        canvas.width = tw; canvas.height = th;
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, tw, th);
        const imgRatio = originalImg.width / originalImg.height;
        const targetRatio = tw / th;
        let dw, dh, x, y;
        if (imgRatio > targetRatio) { dw = tw; dh = tw / imgRatio; x = 0; y = (th - dh) / 2; }
        else { dh = th; dw = th * imgRatio; x = (tw - dw) / 2; y = 0; }
        ctx.drawImage(originalImg, x, y, dw, dh);
        const link = document.createElement('a');
        link.download = `EasyUseHub_${currentMode}.png`;
        link.href = canvas.toDataURL();
        link.click();
    }
</script>
</body>
</html>
